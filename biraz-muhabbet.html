<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biraz Muhabbet | Hamza Pak (Hâimî)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f1ea; color: #1a1a1a; line-height: 1.8; }
        header { background: #1a1a1a; color: #f4f1ea; padding: 35px 20px; text-align: center; border-bottom: 3px solid #d4af37; }
        header h1 { font-family: 'Georgia', 'Garamond', 'Palatino', serif; font-style: italic; font-size: 55px; color: #d4af37; margin-bottom: 5px; font-weight: normal; line-height: 1.1; letter-spacing: 2px; }
        nav { margin-top: 15px; }
        nav a { color: #f4f1ea; text-decoration: none; margin: 0 15px; font-weight: 600; padding: 5px 15px; border-radius: 4px; transition: 0.3s; font-size: 14px; letter-spacing: 1px; }
        nav a:hover, nav a.active { color: #1a1a1a; background: #d4af37; }
        .container { max-width: 800px; margin: 50px auto; padding: 0 20px; }
        h2 { text-align: center; margin-bottom: 50px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; border-bottom: 1px solid #d4af37; padding-bottom: 10px; }
        
        .article { background: transparent; padding: 10px 0 10px 30px; margin-bottom: 50px; border-left: 3px solid #d4af37; }
        .article-title { font-family: 'Georgia', serif; font-weight: bold; font-size: 24px; color: #1a1a1a; margin-bottom: 3px; letter-spacing: 0.5px; }
        .article-date { font-size: 13px; color: #777; display: block; margin-bottom: 15px; font-style: italic; }
        .article-body { font-size: 16px; color: #555; }
        
        /* Butonları Yan Yana Dizen ve Beğen Butonunu Şekillendiren Alan */
        .article-actions { display: flex; align-items: center; gap: 20px; margin-top: 15px; }
        .read-more { display: inline-block; color: #d4af37; text-decoration: none; font-weight: 600; font-size: 14px; border-bottom: 1px dashed #d4af37; transition: 0.2s; }
        .read-more:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }
        .list-like-btn { background: transparent; border: 1px solid #d4af37; color: #1a1a1a; padding: 4px 12px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 13px; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        
        footer { text-align: center; padding: 25px; background: #1a1a1a; color: #f4f1ea; margin-top: 80px; font-size: 13px; border-top: 2px solid #d4af37; }
        @media (max-width: 768px) { header h1 { font-size: 42px; } .container { margin: 30px auto; } .article { padding-left: 20px; } }
    </style>
</head>
<body>
    <header>
        <h1>Hamza Pak (Hâimî)</h1>
        <nav>
            <a href="index.html">Ana Sayfa</a>
            <a href="sozsel-sanatlar.html">Sözsel Sanatlar</a>
            <a href="gorsel-sanatlar.html">Görsel Sanatlar</a>
            <a href="biraz-muhabbet.html" class="active">Biraz Muhabbet</a>
        </nav>
    </header>
    <div class="container">
        <h2>Biraz Muhabbet</h2>
        
        <!-- 1. Blog Yazısı Özeti -->
        <div class="article">
            <h3 class="article-title">Sanatın Hayatımdaki Yeri</h3>
            <span class="article-date">Yayınlanma: 19 Temmuz 2026</span>
            <div class="article-body">Bu benim sitemdeki ilk blog yazım. Burada dünyayı nasıl gördüğümü, kelimelerin...</div>
            
            <div class="article-actions">
                <a href="yazi-dosyalari/sanatin-yeri.html" class="read-more">Devamını Oku...</a>
                <!-- Gizli Sayılı Ortak Beğeni Butonu -->
                <button class="list-like-btn" data-id="/yazi-dosyalari/sanatin-yeri.html">
                    ❤️ Beğen <span class="like-count" style="display: none;">0</span>
                </button>
            </div>
        </div>
    </div>
    <footer><p>&copy; 2026 - Tüm Hakları Saklıdır.</p></footer>

    <!-- SENKRONİZASYON SCRIPT KODU -->
    <script>
        document.querySelectorAll('.list-like-btn').forEach(btn => {
            const id = btn.getAttribute('data-id');
            const countSpan = btn.querySelector('.like-count');
            let likes = parseInt(localStorage.getItem('likes_' + id)) || 0;
            let isLiked = localStorage.getItem('isLiked_' + id) === 'true';
            countSpan.innerText = likes;
            if (isLiked) btn.style.background = '#d4af37';

            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!isLiked) {
                    likes++; isLiked = true;
                    localStorage.setItem('likes_' + id, likes);
                    localStorage.setItem('isLiked_' + id, 'true');
                    btn.style.background = '#d4af37';
                } else {
                    likes--; isLiked = false;
                    localStorage.setItem('likes_' + id, likes);
                    localStorage.removeItem('isLiked_' + id);
                    btn.style.background = 'transparent';
                }
                countSpan.innerText = likes;
            });
        });
    </script>
</body>
</html>
