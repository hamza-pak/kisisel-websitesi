<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel Sanatlar | Hamza Pak (Hâimî)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f1ea; color: #1a1a1a; line-height: 1.6; }
        header { background: #1a1a1a; color: #f4f1ea; padding: 35px 20px; text-align: center; border-bottom: 3px solid #d4af37; }
        header h1 { font-family: 'Georgia', 'Garamond', 'Palatino', serif; font-style: italic; font-size: 55px; color: #d4af37; margin-bottom: 5px; font-weight: normal; line-height: 1.1; letter-spacing: 2px; }
        nav { margin-top: 15px; }
        nav a { color: #f4f1ea; text-decoration: none; margin: 0 15px; font-weight: 600; padding: 5px 15px; border-radius: 4px; transition: 0.3s; font-size: 14px; letter-spacing: 1px; }
        nav a:hover, nav a.active { color: #1a1a1a; background: #d4af37; }
        .container { max-width: 1000px; margin: 50px auto; padding: 0 20px; }
        h2 { text-align: center; margin-bottom: 50px; color: #1a1a1a; text-transform: uppercase; letter-spacing: 2px; font-size: 24px; border-bottom: 1px solid #d4af37; padding-bottom: 10px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 35px; }
        .gallery-item { background: transparent; display: flex; flex-direction: column; align-items: center; }
        .gallery-item img { 
            width: 280px; /* Çerçevenin genişliğini daha küçük ve zarif bir boyuta sabitledik */
            height: 280px; /* Yüksekliği de eşitleyerek kusursuz bir kare (1:1) elde ettik */
            
            /* SİHİRLİ DOKUNUŞ: Kısa kenarı baz alır, resmi ezmeden merkezden kare sığdırır */
            object-fit: cover; 
            
            border: 2px solid #d4af37; /* Altın sarısı ince çerçeve */
            border-radius: 2px;
            display: block;
            margin: 0 auto; /* Kare çerçeveyi kendi sütununda tam ortalar */
            transition: transform 0.3s, box-shadow 0.3s; 
        }
        
        .gallery-item img:hover { 
            transform: scale(1.03); 
            box-shadow: 0 10px 20px rgba(26,26,26,0.12);
        }
        .gallery-item p { padding: 15px 0 2px 0; text-align: center; font-weight: 600; font-size: 15px; color: #1a1a1a; }
        .artwork-date { font-size: 12px; color: #777; font-style: italic; margin-bottom: 10px; }
        
        /* Butonları Yan Yana Dizen ve Beğen Butonunu Şekillendiren Alan */
        .gallery-actions { display: flex; align-items: center; gap: 15px; margin-top: 5px; }
        .read-more { color: #d4af37; text-decoration: none; font-weight: 600; font-size: 13px; border-bottom: 1px dashed #d4af37; transition: 0.2s; }
        .read-more:hover { color: #1a1a1a; border-bottom-color: #1a1a1a; }
        .list-like-btn { background: transparent; border: 1px solid #d4af37; color: #1a1a1a; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 12px; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        
        footer { text-align: center; padding: 25px; background: #1a1a1a; color: #f4f1ea; margin-top: 80px; font-size: 13px; border-top: 2px solid #d4af37; }
        @media (max-width: 768px) { header h1 { font-size: 42px; } .container { margin: 30px auto; } }
    </style>
</head>
<body>
    <header>
        <h1>Hamza Pak (Hâimî)</h1>
        <nav>
            <a href="index.html">Ana Sayfa</a>
            <a href="sozsel-sanatlar.html">Sözsel Sanatlar</a>
            <a href="gorsel-sanatlar.html" class="active">Görsel Sanatlar</a>
            <a href="biraz-muhabbet.html">Biraz Muhabbet</a>
        </nav>
    </header>
    <div class="container">
        <h2>Görsel Sanatlar</h2>
        <div class="gallery">
            <!-- 1. Resim Kartı -->
            <div class="gallery-item">
                <img src="gorsel-dosyalari/cizim/kor-masumiyet-kucuk.webp" alt="Kör Mâsumiyet">
                <p>Kör Mâsumiyet</p>
                <span class="artwork-date">Şubat 2026</span>
                
                <div class="gallery-actions">
                    <a href="resim-dosyalari/kor-masumiyet.html" class="read-more">Detayları Gör...</a>
                    <!-- Gizli Sayılı Ortak Beğeni Butonu -->
                    <button class="list-like-btn" data-id="/resim-dosyalari/kor-masumiyet.html">
                        ❤️ Beğen <span class="like-count" style="display: none;">0</span>
                    </button>
                </div>
            </div>
        </div>
    </div>
    <footer><p>&copy; 2026 - Tüm Hakları Saklıdır.</p></footer>

    <!-- SENKRONİZASYON SCRIPT KODU -->
    <script>
        document.querySelectorAll('.list-like-btn').forEach(btn => {
            const id = btn.getAttribute('data-id');
            const countSpan = btn.querySelector('.like-count');
            let likes = parseInt(localStorage.getItem('likes_' + id)) || 0;
            let isLiked = localStorage.getItem('isLiked_' + id) === 'true';
            countSpan.innerText = likes;
            if (isLiked) btn.style.background = '#d4af37';

            btn.addEventListener('click', (e) => {
                e.preventDefault();
                if (!isLiked) {
                    likes++; isLiked = true;
                    localStorage.setItem('likes_' + id, likes);
                    localStorage.setItem('isLiked_' + id, 'true');
                    btn.style.background = '#d4af37';
                } else {
                    likes--; isLiked = false;
                    localStorage.setItem('likes_' + id, likes);
                    localStorage.removeItem('isLiked_' + id);
                    btn.style.background = 'transparent';
                }
                countSpan.innerText = likes;
            });
        });
    </script>
</body>
</html>
